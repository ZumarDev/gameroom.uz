name: CI/CD

on:
  push:
    branches:
      - main
      - muslim
  pull_request:
    branches:
      - main
      - muslim
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        env:
          SESSION_SECRET: test-secret
          SECRET_ADMIN_KEY: test-admin-key
          DATABASE_URL: sqlite:///test.db
        run: python -c "from app import app; print(app.url_map)"

      - name: Compile project
        run: python -m compileall .

  deploy:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          if [ "${TARGET_BRANCH}" = "main" ]; then
            DEPLOY_HOST="${{ secrets.PROD_SSH_HOST }}"
            DEPLOY_PORT="${{ secrets.PROD_SSH_PORT }}"
            DEPLOY_USER="${{ secrets.PROD_SSH_USER }}"
            DEPLOY_KEY="${{ secrets.PROD_SSH_PRIVATE_KEY }}"
            DEPLOY_APP_DIR="${{ secrets.PROD_APP_DIR }}"
            DEPLOY_SERVICE_NAME="${{ secrets.PROD_SERVICE_NAME }}"
            DEPLOY_HEALTHCHECK_URL="${{ secrets.PROD_HEALTHCHECK_URL }}"
          else
            DEPLOY_HOST="${{ secrets.STAGING_SSH_HOST }}"
            DEPLOY_PORT="${{ secrets.STAGING_SSH_PORT }}"
            DEPLOY_USER="${{ secrets.STAGING_SSH_USER }}"
            DEPLOY_KEY="${{ secrets.STAGING_SSH_PRIVATE_KEY }}"
            DEPLOY_APP_DIR="${{ secrets.STAGING_APP_DIR }}"
            DEPLOY_SERVICE_NAME="${{ secrets.STAGING_SERVICE_NAME }}"
            DEPLOY_HEALTHCHECK_URL="${{ secrets.STAGING_HEALTHCHECK_URL }}"
          fi

          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_SERVICE_NAME="${DEPLOY_SERVICE_NAME:-gameroom.service}"

          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_KEY DEPLOY_APP_DIR DEPLOY_HEALTHCHECK_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret for branch ${TARGET_BRANCH}: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          {
            echo "deploy_host=${DEPLOY_HOST}"
            echo "deploy_port=${DEPLOY_PORT}"
            echo "deploy_user=${DEPLOY_USER}"
            echo "deploy_app_dir=${DEPLOY_APP_DIR}"
            echo "deploy_service_name=${DEPLOY_SERVICE_NAME}"
            echo "deploy_healthcheck_url=${DEPLOY_HEALTHCHECK_URL}"
            echo "deploy_key<<EOF"
            echo "${DEPLOY_KEY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ steps.target.outputs.deploy_host }}
          DEPLOY_PORT: ${{ steps.target.outputs.deploy_port }}
          DEPLOY_KEY: ${{ steps.target.outputs.deploy_key }}
        run: |
          set -euo pipefail
          SSH_DIR="${HOME}/.ssh"
          mkdir -p "${SSH_DIR}"
          chmod 700 "${SSH_DIR}"
          printf '%s\n' "${DEPLOY_KEY}" > "${SSH_DIR}/id_ed25519"
          chmod 600 "${SSH_DIR}/id_ed25519"
          touch "${SSH_DIR}/known_hosts"
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> "${SSH_DIR}/known_hosts"

      - name: Deploy on server
        shell: bash
        env:
          DEPLOY_HOST: ${{ steps.target.outputs.deploy_host }}
          DEPLOY_PORT: ${{ steps.target.outputs.deploy_port }}
          DEPLOY_USER: ${{ steps.target.outputs.deploy_user }}
          DEPLOY_APP_DIR: ${{ steps.target.outputs.deploy_app_dir }}
          DEPLOY_SERVICE_NAME: ${{ steps.target.outputs.deploy_service_name }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export TARGET_BRANCH='${TARGET_BRANCH}' SERVER_APP_DIR='${DEPLOY_APP_DIR}' SERVICE_NAME='${DEPLOY_SERVICE_NAME}'; bash -lc 'cd \"\$SERVER_APP_DIR\" && git fetch origin && git checkout \"\$TARGET_BRANCH\" && git pull origin \"\$TARGET_BRANCH\" && chmod +x scripts/deploy.sh && ./scripts/deploy.sh \"\$TARGET_BRANCH\" \"\$SERVICE_NAME\"'"

      - name: Health check
        shell: bash
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ steps.target.outputs.deploy_healthcheck_url }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${DEPLOY_HEALTHCHECK_URL}"
